<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Fitness Challenge</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#1a1d21" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Montserrat (headings) + Open Sans (body) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Open+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  </head>
  <body>
    <script>
      (function () {
        var t = localStorage.getItem('75-hard-theme') || 'dark';
        var eff =
          t === 'system'
            ? window.matchMedia('(prefers-color-scheme: light)').matches
              ? 'light'
              : 'dark'
            : t === 'light'
              ? 'light'
              : 'dark';
        document.documentElement.setAttribute('data-theme', eff);
      })();
    </script>
    <app-root></app-root>
  </body>
</html>

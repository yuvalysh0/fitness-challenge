<div class="layout flex min-h-screen flex-col">
  <mat-toolbar
    class="layout__toolbar flex flex-wrap items-center gap-1 border-b border-[var(--border)] bg-[var(--mat-sys-surface)] px-4 py-2"
  >
    <a
      matButton
      [matButton]="'text'"
      routerLink="/"
      class="layout__nav-item"
      [class.layout__nav-item--active]="isActive('/')"
    >
      <span class="material-icons layout__nav-icon" aria-hidden="true">dashboard</span>
      Dashboard
    </a>
    <a
      matButton
      [matButton]="'text'"
      routerLink="/daily"
      class="layout__nav-item"
      [class.layout__nav-item--active]="isActive('/daily')"
    >
      <span class="material-icons layout__nav-icon" aria-hidden="true">today</span>
      Today
    </a>
    <a
      matButton
      [matButton]="'text'"
      routerLink="/measurements"
      class="layout__nav-item"
      [class.layout__nav-item--active]="isActive('/measurements')"
    >
      <span class="material-icons layout__nav-icon" aria-hidden="true">straighten</span>
      Measurements
    </a>
    <a
      matButton
      [matButton]="'text'"
      routerLink="/habits"
      class="layout__nav-item"
      [class.layout__nav-item--active]="isActive('/habits')"
    >
      <span class="material-icons layout__nav-icon" aria-hidden="true">check_circle</span>
      Tasks
    </a>
    <span class="flex-1"></span>
    <button
      matButton
      [matButton]="'text'"
      type="button"
      (click)="signOut()"
      class="layout__sign-out"
    >
      <span class="material-icons layout__nav-icon" aria-hidden="true">logout</span>
      Sign out
    </button>
  </mat-toolbar>
  <main class="layout__main flex-1 p-6 max-w-3xl mx-auto w-full">
    <router-outlet />
  </main>
</div>

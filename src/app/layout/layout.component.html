<div class="layout flex min-h-screen flex-col">
  <header class="layout__header border-b border-[var(--border)] bg-[var(--surface)]">
    <nav class="layout__nav flex flex-wrap items-center gap-1 px-4 py-3">
      <a routerLink="/" class="nav-link" [class.nav-link--active]="isActive('/')">
        <span class="material-icons layout__nav-icon" aria-hidden="true">dashboard</span>
        Dashboard
      </a>
      <a routerLink="/daily" class="nav-link" [class.nav-link--active]="isActive('/daily')">
        <span class="material-icons layout__nav-icon" aria-hidden="true">today</span>
        Today
      </a>
      <a routerLink="/progress" class="nav-link" [class.nav-link--active]="isActive('/progress')">
        <span class="material-icons layout__nav-icon" aria-hidden="true">photo_library</span>
        Progress
      </a>
      <a
        routerLink="/measurements"
        class="nav-link"
        [class.nav-link--active]="isActive('/measurements')"
      >
        <span class="material-icons layout__nav-icon" aria-hidden="true">straighten</span>
        Measurements
      </a>
      <a routerLink="/habits" class="nav-link" [class.nav-link--active]="isActive('/habits')">
        <span class="material-icons layout__nav-icon" aria-hidden="true">check_circle</span>
        Tasks
      </a>
      <span class="flex-1"></span>
      <button type="button" class="btn btn--ghost" (click)="signOut()">
        <span class="material-icons layout__nav-icon" aria-hidden="true">logout</span>
        Sign out
      </button>
    </nav>
  </header>
  <main class="layout__main flex-1 p-6 max-w-3xl mx-auto w-full">
    <router-outlet />
  </main>
</div>

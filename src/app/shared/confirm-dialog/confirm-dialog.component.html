<div class="confirm-dialog">
  <h2 class="confirm-dialog__title">{{ data.title }}</h2>
  <p class="confirm-dialog__message">{{ data.message }}</p>
  <div class="confirm-dialog__actions">
    <button type="button" class="btn btn--ghost confirm-dialog__btn" (click)="cancel()">
      {{ cancelText }}
    </button>
    <button
      type="button"
      class="btn confirm-dialog__btn"
      [class.btn--error]="data.confirmWarn"
      [class.btn--primary]="!data.confirmWarn"
      (click)="confirm()"
    >
      {{ confirmText }}
    </button>
  </div>
</div>

<div class="habit-form-row">
  <div class="habit-form-row__icon-cell">
    <app-emoji-picker [options]="emojiOptions()" [(value)]="icon" />
  </div>

  <div class="habit-form-row__label-cell field min-w-0">
    <input
      class="field__input"
      type="text"
      [ngModel]="label()"
      (ngModelChange)="label.set($event)"
      placeholder="Task label"
    />
  </div>

  <div class="habit-form-row__actions-cell flex gap-2">
    <button class="btn btn--primary" type="button" (click)="save()">Save</button>
    <button class="btn btn--secondary" type="button" (click)="cancel()">Cancel</button>
  </div>
</div>

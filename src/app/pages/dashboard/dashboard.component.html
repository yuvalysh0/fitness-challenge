<div class="dashboard max-w-md">
  <h1 class="dashboard__title m-0 mb-1 text-2xl font-bold tracking-tight">75 Hard</h1>
  <p class="dashboard__subtitle m-0 mb-1 text-[var(--text-muted)]">
    Day {{ currentDay() }} of {{ totalDays }}
  </p>
  <p class="dashboard__tagline m-0 mb-6 text-sm text-[var(--text-muted)]">
    Mental toughness program. Miss one task = restart from Day 1.
  </p>

  <div class="card dashboard__progress-card mb-6">
    <mat-progress-bar
      mode="determinate"
      [value]="progressPercent()"
      class="dashboard__progress-bar mb-3 h-2 w-full rounded-full"
    />
    <p class="dashboard__progress-label m-0 text-sm text-[var(--text-muted)]">
      {{ progressPercent() | number: '1.0-0' }}% complete
    </p>
  </div>

  <div class="dashboard__stats flex gap-8 mb-8">
    <div class="dashboard__stat flex flex-col">
      <span class="dashboard__stat-value text-2xl font-semibold text-[var(--accent)]">{{
        daysCompleted()
      }}</span>
      <span class="dashboard__stat-label text-sm text-[var(--text-muted)]">Days logged</span>
    </div>
    <div class="dashboard__stat flex flex-col">
      <span class="dashboard__stat-value text-2xl font-semibold text-[var(--accent)]">{{
        daysRemaining()
      }}</span>
      <span class="dashboard__stat-label text-sm text-[var(--text-muted)]">Days left</span>
    </div>
  </div>

  <div class="dashboard__actions flex flex-wrap gap-3">
    <a class="btn btn--primary" routerLink="/daily">Log today</a>
    <a class="btn btn--secondary" routerLink="/measurements">Measurements</a>
    <a class="btn btn--secondary" routerLink="/habits">Edit tasks</a>
  </div>
</div>
